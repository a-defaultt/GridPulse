services:
  gridpulse:
    build: .
    image: gridpulse:latest
    container_name: gridpulse
    # Direct system execution identity matching host user with fallback safety
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./sources.yaml:/app/sources.yaml
      - ./.env:/app/.env
    restart: unless-stopped
    environment:
      - DATABASE_PATH=data/GridPulse.db
      - SOURCES_YAML=sources.yaml
