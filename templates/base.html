<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; }
        .header { background: #1a237e; color: #fff; padding: 20px; text-align: center; }
        .footer { font-size: 0.8em; color: #777; text-align: center; margin-top: 30px; padding: 20px; }
        .article { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .article.featured { border-left: 4px solid #1a237e; padding-left: 15px; }
        .title { font-size: 1.2em; font-weight: bold; margin-bottom: 5px; }
        .title a { color: #1a237e; text-decoration: none; }
        .meta { font-size: 0.85em; color: #666; margin-bottom: 10px; }
        .summary { margin-top: 10px; }
        .cve { display: inline-block; background: #f44336; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; margin-right: 10px; }
        .cvss { display: inline-block; background: #ff9800; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>GridPulse</h1>
        <p>{% block subtitle %}{% endblock %}</p>
        <p>{{ date_display }}</p>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p>&copy; 2026 GridPulse. All rights reserved.</p>
        <p>This is an automated cybersecurity intelligence report.</p>
    </div>
</body>
</html>
